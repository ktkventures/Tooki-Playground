<!DOCTYPE html>
<!--
  family-tree.html — Step 2: People, editing, and relationships.

  This is ONE file that contains three parts working together:
    1. HTML  — the structure of the page (the "bones")
    2. CSS   — the styling inside the <style> tag (the "clothes")
    3. JavaScript — the behavior inside the <script> tag (the "brain")

  To use it: just double-click this file and it opens in your web browser.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- This line makes the page look right on phones as well as computers. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Tree Creator</title>

  <style>
    /*
      CSS section. Each block below picks something on the page
      (by its tag name, its "class", or its "id") and describes how
      it should look.
    */

    /* "body" is the whole page. This sets the overall look. */
    body {
      font-family: Arial, sans-serif;   /* a clean, easy-to-read font */
      max-width: 600px;                 /* keep the content from getting too wide */
      margin: 40px auto;                /* center the content, with space on top */
      padding: 0 20px;                  /* a little breathing room on the sides */
      background-color: #f7f5f2;        /* soft off-white background */
      color: #2b2b2b;                   /* dark gray text (softer than pure black) */
    }

    h1 {
      text-align: center;
    }

    /* Section headings ("People", "Relationships"). */
    h2 {
      margin-top: 32px;
      border-bottom: 2px solid #e0dcd5;  /* a thin underline to separate sections */
      padding-bottom: 6px;
    }

    /* A row that holds inputs and a button side by side. */
    .add-row {
      display: flex;        /* place items in a row */
      flex-wrap: wrap;      /* if they don't fit, let them wrap onto the next line */
      gap: 8px;             /* a small gap between items */
      margin-bottom: 16px;
    }

    /* The text box where you type a name. */
    #name-input {
      flex: 1;              /* let the text box stretch to fill the space */
      padding: 10px;
      font-size: 16px;
      border: 1px solid #c9c4bd;
      border-radius: 6px;   /* slightly rounded corners */
    }

    /* Dropdown menus (the "select" boxes) in the relationship row. */
    select {
      flex: 1 1 130px;      /* stretch, but try to be at least 130px wide */
      padding: 10px;
      font-size: 15px;
      border: 1px solid #c9c4bd;
      border-radius: 6px;
      background-color: white;
    }

    /* Shared look for all buttons on the page. */
    button {
      cursor: pointer;      /* show a clicking hand when hovering */
      border: none;
      border-radius: 6px;
      font-size: 16px;
    }

    /* The main green "Add" buttons. */
    .add-button {
      padding: 10px 18px;
      background-color: #5b8a72;  /* calm green */
      color: white;
    }

    /* "ul" is a list. We remove the default bullet points. */
    ul {
      list-style: none;
      padding: 0;
    }

    /* Each person or relationship sits in its own "li" (list item) row. */
    li {
      display: flex;
      justify-content: space-between;  /* text on the left, buttons on the right */
      align-items: center;
      gap: 8px;
      background-color: white;
      border: 1px solid #e0dcd5;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 8px;
    }

    /* The little group that holds the Edit and x buttons together. */
    .button-group {
      display: flex;
      gap: 6px;
    }

    /* The "Edit" button on each person's row. */
    .edit-button {
      padding: 6px 12px;
      background-color: #4a6d8c;  /* calm blue */
      color: white;
      font-size: 14px;
    }

    /* The "Save" button shown while editing a name. */
    .save-button {
      padding: 6px 12px;
      background-color: #5b8a72;  /* calm green */
      color: white;
      font-size: 14px;
    }

    /* The text box shown while editing a name. */
    .edit-input {
      flex: 1;
      padding: 8px;
      font-size: 16px;
      border: 1px solid #c9c4bd;
      border-radius: 6px;
    }

    /* The small "x" button that removes a person or relationship. */
    .remove-button {
      /* A fixed width and height make it a small, even square. */
      width: 24px;
      height: 24px;
      padding: 0;
      background-color: #b5544c;  /* muted red */
      color: white;
      font-size: 14px;
      line-height: 1;             /* keeps the "x" centered vertically */
    }

    /* A friendly message shown when a list is empty. */
    .empty-message {
      text-align: center;
      color: #8a8a8a;
      font-style: italic;
    }
  </style>
</head>

<body>

  <!--
    HTML section. This is the visible structure of the page.
  -->

  <h1>Family Tree Creator</h1>

  <!-- ===== PEOPLE SECTION ===== -->
  <h2>People</h2>

  <!-- The row with the text box and the Add button. -->
  <div class="add-row">
    <!--
      "id" gives an element a unique name so the JavaScript can find it.
      "placeholder" is the faint hint text shown when the box is empty.
    -->
    <input type="text" id="name-input" placeholder="Type a character's name...">
    <button id="add-button" class="add-button">Add</button>
  </div>

  <!-- This list is where each person appears. JavaScript fills it in. -->
  <ul id="people-list"></ul>

  <!-- ===== RELATIONSHIPS SECTION ===== -->
  <h2>Relationships</h2>

  <!--
    The row for adding a relationship: two person dropdowns with a
    relationship-type dropdown in the middle. JavaScript fills the
    dropdowns with your people and the relationship choices.
  -->
  <div class="add-row">
    <select id="person-a"></select>
    <select id="relationship-type"></select>
    <select id="person-b"></select>
    <button id="add-relationship-button" class="add-button">Add</button>
  </div>

  <!-- This list is where each relationship appears. -->
  <ul id="relationships-list"></ul>


  <script>
    /*
      JavaScript section — the "brain" of the page.

      Read this top to bottom. Comments explain WHY each piece exists.
    */

    // --- Step A: Find the parts of the page we need to work with. ---
    // document.getElementById finds an element by the "id" we gave it.
    const nameInput            = document.getElementById("name-input");
    const addButton            = document.getElementById("add-button");
    const peopleList           = document.getElementById("people-list");

    const personASelect        = document.getElementById("person-a");
    const personBSelect        = document.getElementById("person-b");
    const typeSelect           = document.getElementById("relationship-type");
    const addRelationshipBtn   = document.getElementById("add-relationship-button");
    const relationshipsList    = document.getElementById("relationships-list");

    // The "drawers" in the browser's storage where we keep each kind of data.
    const PEOPLE_KEY        = "familyTreePeople";
    const RELATIONSHIPS_KEY = "familyTreeRelationships";

    // The kinds of relationship you can pick. Each one has:
    //   value — a short code we store
    //   label — the friendly wording shown on screen
    // Keeping these in one list means we can reuse it in two places:
    // to fill the dropdown AND to write the relationship out in words.
    const RELATIONSHIP_TYPES = [
      { value: "parent",  label: "is the parent of" },
      { value: "child",   label: "is a child of" },
      { value: "partner", label: "is a partner of" },
      { value: "sibling", label: "is a sibling of" }
    ];

    // --- Step B: Our data. ---
    // "people" is a list where each person is a small bundle: { id, name }.
    // The "id" is a permanent, unique number — like a membership number.
    // It never changes, even if the name does. Relationships point at IDs.
    let people = loadPeople();

    // "relationships" is a list where each connection is a bundle:
    //   { id, fromId, toId, type }
    // fromId and toId are the IDs of the two people being connected.
    let relationships = loadRelationships();

    // "nextId" is the next unused number. Every new person or relationship
    // takes this number, then we add 1 so the next one is different.
    let nextId = computeNextId();

    // "editingId" remembers which person (by ID) is currently being edited.
    // It is null when nobody is being edited.
    let editingId = null;

    // --- Step C: Functions (reusable instructions). ---

    // makeId: hands out the next unused ID number.
    function makeId() {
      const id = nextId;
      nextId = nextId + 1;
      return id;
    }

    // computeNextId: works out a safe starting point for new IDs by
    // finding the highest ID already in use and adding 1.
    function computeNextId() {
      let highest = 0;
      people.forEach(function (person) {
        if (person.id > highest) { highest = person.id; }
      });
      relationships.forEach(function (rel) {
        if (rel.id > highest) { highest = rel.id; }
      });
      return highest + 1;
    }

    // findPerson: looks up a person by their ID. Returns the person
    // bundle, or undefined if no one matches.
    function findPerson(id) {
      return people.find(function (person) {
        return person.id === id;
      });
    }

    // loadPeople: gets the saved people out of the browser's storage.
    function loadPeople() {
      const savedText = localStorage.getItem(PEOPLE_KEY);
      if (!savedText) {
        return [];  // nothing saved yet — start with an empty list
      }
      const saved = JSON.parse(savedText);
      // Older versions of this page saved each person as just a name
      // (plain text). Here we quietly upgrade that old format into the
      // new { id, name } bundle so existing names keep working.
      return saved.map(function (item, index) {
        if (typeof item === "string") {
          return { id: index + 1, name: item };
        }
        return item;  // already in the new format
      });
    }

    // loadRelationships: gets the saved relationships out of storage.
    function loadRelationships() {
      const savedText = localStorage.getItem(RELATIONSHIPS_KEY);
      if (!savedText) {
        return [];
      }
      return JSON.parse(savedText);
    }

    // savePeople: writes the people list into the browser's storage.
    function savePeople() {
      // JSON.stringify turns our list into text so it can be stored.
      localStorage.setItem(PEOPLE_KEY, JSON.stringify(people));
    }

    // saveRelationships: writes the relationships list into storage.
    function saveRelationships() {
      localStorage.setItem(RELATIONSHIPS_KEY, JSON.stringify(relationships));
    }

    // ----- Drawing the PEOPLE list -----

    // renderPeople: redraws the on-screen people list to match our data.
    function renderPeople() {
      peopleList.innerHTML = "";  // empty it, then rebuild fresh

      if (people.length === 0) {
        const message = document.createElement("li");
        message.textContent = "No one here yet — add your first character above.";
        message.className = "empty-message";
        peopleList.appendChild(message);
        return;
      }

      people.forEach(function (person) {
        const row = document.createElement("li");

        // If THIS person is the one being edited, show a text box and
        // a Save button instead of the normal name and buttons.
        if (person.id === editingId) {
          const input = document.createElement("input");
          input.type = "text";
          input.className = "edit-input";
          input.value = person.name;   // start with the current name

          const saveButton = document.createElement("button");
          saveButton.textContent = "Save";
          saveButton.className = "save-button";
          saveButton.addEventListener("click", function () {
            saveEditedName(person.id, input.value);
          });

          // Pressing Enter while typing also saves.
          input.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
              saveEditedName(person.id, input.value);
            }
          });

          row.appendChild(input);
          row.appendChild(saveButton);
        } else {
          // Normal display: the name, then an Edit button and an x button.
          const nameText = document.createElement("span");
          nameText.textContent = person.name;

          const editButton = document.createElement("button");
          editButton.textContent = "Edit";
          editButton.className = "edit-button";
          editButton.addEventListener("click", function () {
            editingId = person.id;   // mark this person as being edited
            renderPeople();          // redraw so the text box appears
          });

          const removeButton = document.createElement("button");
          removeButton.textContent = "x";
          removeButton.className = "remove-button";
          removeButton.title = "Remove";
          removeButton.addEventListener("click", function () {
            removePerson(person.id);
          });

          // Keep the two buttons together in a little group.
          const buttonGroup = document.createElement("div");
          buttonGroup.className = "button-group";
          buttonGroup.appendChild(editButton);
          buttonGroup.appendChild(removeButton);

          row.appendChild(nameText);
          row.appendChild(buttonGroup);
        }

        peopleList.appendChild(row);
      });
    }

    // addPerson: adds a new person to our list.
    function addPerson() {
      const newName = nameInput.value.trim();  // .trim() removes blank spaces
      if (newName === "") {
        return;  // nothing typed — do nothing
      }

      // Each new person gets a fresh ID and the typed name.
      people.push({ id: makeId(), name: newName });

      savePeople();
      renderPeople();
      refreshPersonDropdowns();  // the new person should appear in the dropdowns

      nameInput.value = "";
      nameInput.focus();
    }

    // saveEditedName: stores a new name for the person being edited.
    function saveEditedName(id, newNameRaw) {
      const newName = newNameRaw.trim();
      if (newName === "") {
        return;  // refuse to save an empty name
      }

      const person = findPerson(id);
      if (person) {
        person.name = newName;  // the ID stays the same; only the name changes
      }

      editingId = null;  // we're done editing
      savePeople();
      renderPeople();
      refreshPersonDropdowns();  // dropdowns show names, so refresh them
      renderRelationships();     // relationship wording uses names too
    }

    // removePerson: deletes a person AND any relationships that mention them.
    function removePerson(id) {
      // .filter keeps only the items that pass the test, dropping the rest.
      people = people.filter(function (person) {
        return person.id !== id;
      });

      // Drop any relationship where this person was either side,
      // so we never leave a connection pointing at someone gone.
      relationships = relationships.filter(function (rel) {
        return rel.fromId !== id && rel.toId !== id;
      });

      if (editingId === id) {
        editingId = null;  // in case we removed the person being edited
      }

      savePeople();
      saveRelationships();
      renderPeople();
      refreshPersonDropdowns();
      renderRelationships();
    }

    // ----- Drawing the RELATIONSHIPS list -----

    // fillTypeDropdown: puts the relationship choices into the type dropdown.
    function fillTypeDropdown() {
      RELATIONSHIP_TYPES.forEach(function (type) {
        const option = document.createElement("option");
        option.value = type.value;       // the short code we store
        option.textContent = type.label; // the friendly wording shown
        typeSelect.appendChild(option);
      });
    }

    // fillPersonDropdown: puts every person into one dropdown menu.
    function fillPersonDropdown(dropdown) {
      // Remember what was selected so we can keep it after rebuilding.
      const previousValue = dropdown.value;
      dropdown.innerHTML = "";

      // A faint placeholder option shown first.
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "— choose a person —";
      dropdown.appendChild(placeholder);

      people.forEach(function (person) {
        const option = document.createElement("option");
        // The option's value is the person's ID (stored as text).
        option.value = person.id;
        option.textContent = person.name;
        dropdown.appendChild(option);
      });

      dropdown.value = previousValue;  // restore the earlier choice if still valid
    }

    // refreshPersonDropdowns: rebuilds both person dropdowns.
    function refreshPersonDropdowns() {
      fillPersonDropdown(personASelect);
      fillPersonDropdown(personBSelect);
    }

    // labelForType: finds the friendly wording for a relationship code.
    function labelForType(typeValue) {
      const match = RELATIONSHIP_TYPES.find(function (type) {
        return type.value === typeValue;
      });
      return match ? match.label : typeValue;
    }

    // describeRelationship: turns a relationship bundle into a sentence,
    // e.g. "Alex is the parent of Jordan".
    function describeRelationship(rel) {
      const fromPerson = findPerson(rel.fromId);
      const toPerson   = findPerson(rel.toId);
      // If a person is somehow missing, show "(unknown)" rather than crash.
      const fromName = fromPerson ? fromPerson.name : "(unknown)";
      const toName   = toPerson ? toPerson.name : "(unknown)";
      return fromName + " " + labelForType(rel.type) + " " + toName;
    }

    // renderRelationships: redraws the on-screen relationships list.
    function renderRelationships() {
      relationshipsList.innerHTML = "";

      if (relationships.length === 0) {
        const message = document.createElement("li");
        message.textContent = "No relationships yet — connect two people above.";
        message.className = "empty-message";
        relationshipsList.appendChild(message);
        return;
      }

      relationships.forEach(function (rel) {
        const row = document.createElement("li");

        const text = document.createElement("span");
        text.textContent = describeRelationship(rel);

        const removeButton = document.createElement("button");
        removeButton.textContent = "x";
        removeButton.className = "remove-button";
        removeButton.title = "Remove";
        removeButton.addEventListener("click", function () {
          removeRelationship(rel.id);
        });

        row.appendChild(text);
        row.appendChild(removeButton);
        relationshipsList.appendChild(row);
      });
    }

    // addRelationship: connects the two chosen people.
    function addRelationship() {
      // The dropdown values are text. Number(...) turns them into numbers.
      const fromValue = personASelect.value;
      const toValue   = personBSelect.value;

      // Both people must be chosen.
      if (fromValue === "" || toValue === "") {
        alert("Please choose two people for the relationship.");
        return;
      }

      const fromId = Number(fromValue);
      const toId   = Number(toValue);

      // A person can't be in a relationship with themselves.
      if (fromId === toId) {
        alert("Please choose two different people.");
        return;
      }

      relationships.push({
        id: makeId(),
        fromId: fromId,
        toId: toId,
        type: typeSelect.value
      });

      saveRelationships();
      renderRelationships();
    }

    // removeRelationship: deletes one relationship by its ID.
    function removeRelationship(id) {
      relationships = relationships.filter(function (rel) {
        return rel.id !== id;
      });
      saveRelationships();
      renderRelationships();
    }

    // --- Step D: Connect actions to the buttons. ---

    addButton.addEventListener("click", addPerson);

    // Enter key in the name box also adds a person.
    nameInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        addPerson();
      }
    });

    addRelationshipBtn.addEventListener("click", addRelationship);

    // --- Step E: Draw everything once when the page first opens. ---
    fillTypeDropdown();
    refreshPersonDropdowns();
    renderPeople();
    renderRelationships();
  </script>

</body>
</html>
